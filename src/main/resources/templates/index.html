<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Temperature Monitor</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}" />

    <style>
        :root {

            --bg-gradient-start: #111827;
            --bg-gradient-end: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;


            --table-bg: #1f2937;
            --border-color: #374151;
            --header-bg: #111827;
            --header-text: #e5e7eb;
            --row-hover: #374151;


            --temp-color: #f87171;
            --button-bg: #3b82f6;
            --button-hover: #2563eb;
            --button-text: #ffffff;
        }



        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-main);
            margin: 0;
            padding: 3rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }


        .nav-button {
            display: inline-block;
            background-color: var(--button-bg);
            color: var(--button-text);
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-bottom: 2rem;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-button:hover {
            background-color: var(--button-hover);
            transform: translateY(-1px);
            text-decoration: none;
            color: var(--button-text);
        }

        .table-wrapper {
            width: 100%;
            max-width: 900px;
            background-color: var(--table-bg);
            border-radius: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background-color: var(--header-bg);
            color: var(--header-text);
            border-bottom: 2px solid var(--border-color);
        }

        th {
            padding: 1rem 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            color: var(--text-main);
        }

        tbody tr {
            transition: background-color 0.2s ease;
        }

        tbody tr:last-of-type td {
            border-bottom: none;
        }

        tbody tr:hover {
            background-color: var(--row-hover);
        }

        .temp-value {
            font-weight: 700;
            color: var(--temp-color);
            font-size: 1.1rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>

<body>

<form th:action="@{/logout}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <button type="submit">Logout</button>
</form>

<h1>Recent Sensor Readings</h1>

<a class="nav-button" th:href="@{/statistics}">View Statistics</a>

<div class="table-wrapper">
    <table>
        <thead>
        <tr>
            <th>Location</th>
            <th>Temperature</th>
            <th>Timestamp</th>
            <th>Timezone</th> </tr>
        </thead>
        <tbody>
        <tr th:each="recentRecord : ${recentRecords}">
            <td th:text="${recentRecord.locationOfSensor}">Location</td>
            <td class="temp-value" th:text="${#numbers.formatDecimal(recentRecord.temperatureValue, 1, 1)} + ' °C'">0.0 °C</td>

            <td th:text="${#temporals.format(recentRecord.timestamp, 'dd-MM-yyyy HH:mm:ss.SSSSSS')}">26-06-2026 01:30:29.694723</td>

            <td th:text="${recentRecord.timestamp.offset} + '[' + ${recentRecord.timestamp.zone} + ']'">+03:00[Europe/Istanbul]</td>
        </tr>

        <tr th:if="${#lists.isEmpty(recentRecords)}">
            <td colspan="4" class="empty-state">No recent sensor data available.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>

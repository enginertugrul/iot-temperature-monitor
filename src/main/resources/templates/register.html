<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
</head>
<body>
<h1>Create Account</h1>

<form th:action="@{/register}" th:object="${form}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <label>Email</label>
    <input type="email" th:field="*{email}">
    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

    <label>Password</label>
    <input type="password" th:field="*{password}">
    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

    <label>Preferred Language</label>
    <select th:field="*{preferredLanguage}">
        <option th:each="language : ${languages}"
                th:value="${language}"
                th:text="${language.displayName}">
        </option>
    </select>

    <label>Preferred Temperature Unit</label>
    <select th:field="*{preferredTemperatureUnit}">
        <option th:each="unit : ${temperatureUnits}"
                th:value="${unit}"
                th:text="${unit.name()} + ' (' + ${unit.symbol} + ')'">
        </option>
    </select>

    <label>Preferred Timezone</label>
    <select th:field="*{preferredTimezone}">
        <option th:each="timezone : ${timezones}"
                th:value="${timezone}"
                th:text="${timezone}">
        </option>
    </select>
    <p th:if="${#fields.hasErrors('preferredTimezone')}" th:errors="*{preferredTimezone}"></p>

    <button type="submit">Register</button>
</form>

<a th:href="@{/login}">Already have an account?</a>
</body>
</html>

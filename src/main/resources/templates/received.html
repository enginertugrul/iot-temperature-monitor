<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Received Sensor Data</title>
</head>
<body>
<h1>Latest Data Received</h1>

<div th:if="${sensor != null}">
    <p><strong>Location:</strong> <span th:text="${sensor.locationOfSensor}"></span></p>
    <p><strong>Temperature:</strong> <span th:text="${sensor.temperatureValue}"></span>°C</p>
    <p><strong>Timestamp:</strong> <span th:text="${sensor.timestamp}"></span></p>
</div>

<div th:if="${sensor == null}">
    <p style="color: red;">No sensor data found in the database yet.</p>
</div>

</body>
</html>
